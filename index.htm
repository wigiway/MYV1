        function loadSavedPosition() {
            const savedPosition = localStorage.getItem('tourPosition');
            if (savedPosition && savedPosition !== "") {
                // ตรวจสอบว่า iframe พร้อมใช้งานหรือไม่
                const iframe = document.getElementById('viewer').getElementsByTagName('iframe')[0];
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'setMediaByName', position: savedPosition }, '*');
                }
            }
        }

        // รอให้ iframe โหลดเสร็จสมบูรณ์ก่อน
        window.onload = function() {
            const iframe = document.createElement('iframe');
            iframe.src = 'https://myv-1.vercel.app'; // ใส่ URL ของทัวร์ 3DVista ที่ถูกต้องที่นี่
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.onload = loadSavedPosition;
            document.getElementById('viewer').appendChild(iframe);
        };

        // รับข้อความจาก iframe
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'setMediaByName') {
                setMediaByName(event.data.position);
            }
        });
